name: Feature task
description: Track one frontend/backend task for the MotoSales project.
title: "[Task] "
labels: ["task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be delivered?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete checks before closing.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Implementation Notes
      description: Files, APIs, DB tables, or UI pages involved.
    validations:
      required: false
